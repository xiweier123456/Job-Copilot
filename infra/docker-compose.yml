name: job-copilot

services:
  redis:
    image: redis:6-alpine
    container_name: job-copilot-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - E:/docker/job-copilot/redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: job-copilot-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - E:/docker/job-copilot/etcd:/etcd

  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: job-copilot-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "127.0.0.1:9001:9001"
    volumes:
      - E:/docker/job-copilot/minio:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.6.12
    container_name: job-copilot-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9091:9091"
    volumes:
      - E:/docker/job-copilot/milvus:/var/lib/milvus
    depends_on:
      - etcd
      - minio

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: job-copilot-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      EMBEDDING_MODEL: /models/bge-small-zh-v1.5
      RERANKER_MODEL: /models/BAAI-bge-reranker-v2-m3
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      CHECKPOINT_SQLITE_PATH: /app/outputs/checkpoints/langgraph.db
      MEM0_HISTORY_DB_PATH: /app/outputs/mem0/history.db
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - E:/docker/job-copilot/backend/outputs:/app/outputs
      - E:/Study/model:/models:ro
    depends_on:
      - redis
      - milvus

  mcp:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: job-copilot-mcp
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      EMBEDDING_MODEL: /models/bge-small-zh-v1.5
      RERANKER_MODEL: /models/BAAI-bge-reranker-v2-m3
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      CHECKPOINT_SQLITE_PATH: /app/outputs/checkpoints/langgraph.db
      MEM0_HISTORY_DB_PATH: /app/outputs/mem0/history.db
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      MCP_PATH: /mcp
      MCP_TRANSPORT: streamable-http
    command: ["python", "-m", "app.mcp.server"]
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - E:/docker/job-copilot/backend/outputs:/app/outputs
      - E:/Study/model:/models:ro
    depends_on:
      - redis
      - milvus

  frontend:
    build:
      context: ${FRONTEND_DIR:-../vue}
      dockerfile: Dockerfile
    container_name: job-copilot-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - backend
