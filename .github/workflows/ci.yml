name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DEBUG: "false"
      MEMORY_ENABLED: "false"
      REDIS_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check app tests --select E9,F63,F7,F82

      - name: Test
        run: pytest -q

      - name: Validate backend Docker build
        run: docker build -t job-copilot-backend:ci .

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vue/package-lock.json

      - name: Install frontend dependencies
        working-directory: vue
        run: npm ci

      - name: Build frontend
        working-directory: vue
        run: npm run build

      - name: Validate frontend Docker build
        run: docker build -t job-copilot-frontend:ci ./vue
